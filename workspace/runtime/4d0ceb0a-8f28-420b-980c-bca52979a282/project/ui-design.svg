<svg width="1440" height="1800" viewBox="0 0 1440 1800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #F3F4F6; }
      .surface { fill: #FFFFFF; filter: url(#shadow); }
      .surface-flat { fill: #FFFFFF; }
      .muted { fill: #F9FAFB; }
      .border { stroke: #E5E7EB; stroke-width: 1; }
      .primary { fill: #2563EB; }
      .primary-soft { fill: #DBEAFE; }
      .success { fill: #16A34A; }
      .success-soft { fill: #DCFCE7; }
      .warning { fill: #F59E0B; }
      .warning-soft { fill: #FEF3C7; }
      .danger-soft { fill: #FEE2E2; }
      .text-primary { fill: #111827; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }
      .text-secondary { fill: #374151; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }
      .text-muted { fill: #6B7280; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }
      .text-white { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }
      .title { font-size: 24px; font-weight: 700; }
      .h2 { font-size: 18px; font-weight: 700; }
      .body { font-size: 14px; font-weight: 400; }
      .small { font-size: 12px; font-weight: 500; }
      .label { font-size: 12px; font-weight: 600; }
      .num { font-size: 28px; font-weight: 700; }
      .line { stroke: #E5E7EB; stroke-width: 1; }
      .blue-line { stroke: #2563EB; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="1800"/>

  <text x="48" y="54" class="text-primary title">公司内部投票系统 UI 设计图</text>
  <text x="48" y="82" class="text-muted body">主要页面布局、视觉层级、组件状态与响应式参考</text>

  <!-- Section 1 Employee Web -->
  <text x="48" y="132" class="text-primary h2">员工端 / PC：问卷列表与投票详情</text>
  <rect x="48" y="152" width="640" height="520" rx="16" class="surface"/>
  <rect x="48" y="152" width="640" height="56" rx="16" fill="#FFFFFF"/>
  <path d="M48 192 H688" class="line"/>
  <rect x="72" y="170" width="28" height="22" rx="6" class="primary"/>
  <text x="112" y="186" class="text-primary body" font-weight="700">内部投票</text>
  <text x="500" y="186" class="text-muted small">张三 · 退出</text>

  <text x="72" y="242" class="text-primary title">问卷列表</text>
  <text x="72" y="268" class="text-muted body">请选择需要参与的内部投票</text>

  <rect x="72" y="292" width="568" height="128" rx="12" class="surface-flat border"/>
  <text x="96" y="326" class="text-primary h2">2026 年团建活动投票</text>
  <rect x="524" y="306" width="72" height="26" rx="13" class="success-soft"/>
  <text x="540" y="324" class="text-secondary small">进行中</text>
  <text x="96" y="354" class="text-muted body">请根据个人时间和偏好选择团建安排。</text>
  <text x="96" y="384" class="text-muted small">截止：2026-05-07 18:00</text>
  <rect x="428" y="370" width="84" height="32" rx="8" class="primary-soft"/>
  <text x="446" y="391" class="text-secondary small">未提交</text>
  <rect x="524" y="370" width="84" height="32" rx="8" class="primary"/>
  <text x="546" y="391" class="text-white small">去投票</text>

  <rect x="72" y="436" width="568" height="92" rx="12" class="surface-flat border"/>
  <text x="96" y="470" class="text-primary h2">办公区温度偏好投票</text>
  <rect x="524" y="452" width="72" height="26" rx="13" class="warning-soft"/>
  <text x="540" y="470" class="text-secondary small">未开始</text>
  <text x="96" y="500" class="text-muted small">开始：2026-05-10 09:00</text>
  <rect x="524" y="486" width="84" height="30" rx="8" fill="#F3F4F6"/>
  <text x="546" y="506" class="text-muted small">不可投</text>

  <rect x="720" y="152" width="672" height="520" rx="16" class="surface"/>
  <rect x="752" y="184" width="608" height="88" rx="12" class="primary-soft"/>
  <text x="776" y="222" class="text-primary title">2026 年团建活动投票</text>
  <text x="776" y="250" class="text-secondary body">每人仅可提交一次，提交后不可修改。截止：2026-05-07 18:00</text>
  <rect x="1248" y="202" width="80" height="28" rx="14" class="success-soft"/>
  <text x="1266" y="221" class="text-secondary small">进行中</text>

  <rect x="752" y="292" width="608" height="134" rx="12" class="surface-flat border"/>
  <text x="776" y="326" class="text-primary h2">1. 你更希望团建安排在哪一天？ *</text>
  <rect x="776" y="346" width="64" height="24" rx="12" class="primary-soft"/>
  <text x="792" y="363" class="text-secondary small">单选</text>
  <circle cx="786" cy="390" r="8" stroke="#2563EB" stroke-width="2"/>
  <circle cx="786" cy="390" r="4" class="primary"/>
  <text x="806" y="395" class="text-secondary body">周五下午</text>
  <circle cx="946" cy="390" r="8" stroke="#D1D5DB" stroke-width="2"/>
  <text x="966" y="395" class="text-secondary body">周六全天</text>
  <circle cx="1110" cy="390" r="8" stroke="#D1D5DB" stroke-width="2"/>
  <text x="1130" y="395" class="text-secondary body">其他</text>

  <rect x="752" y="446" width="608" height="154" rx="12" class="surface-flat border"/>
  <text x="776" y="480" class="text-primary h2">2. 你偏好的团建活动类型有哪些？ *</text>
  <rect x="776" y="500" width="64" height="24" rx="12" class="primary-soft"/>
  <text x="792" y="517" class="text-secondary small">多选</text>
  <rect x="776" y="546" width="16" height="16" rx="4" class="primary"/>
  <path d="M780 554 L785 559 L790 549" stroke="white" stroke-width="2" fill="none"/>
  <text x="806" y="559" class="text-secondary body">户外徒步</text>
  <rect x="946" y="546" width="16" height="16" rx="4" class="primary"/>
  <path d="M950 554 L955 559 L960 549" stroke="white" stroke-width="2" fill="none"/>
  <text x="976" y="559" class="text-secondary body">其他</text>
  <rect x="776" y="574" width="260" height="36" rx="8" fill="#FFFFFF" stroke="#2563EB"/>
  <text x="792" y="597" class="text-muted small">飞盘活动</text>

  <rect x="1128" y="624" width="104" height="36" rx="8" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="1154" y="647" class="text-secondary small">返回</text>
  <rect x="1244" y="624" width="116" height="36" rx="8" class="primary"/>
  <text x="1274" y="647" class="text-white small">提交投票</text>

  <!-- Section 2 Admin Web -->
  <text x="48" y="736" class="text-primary h2">管理端 / PC：后台框架、问卷管理、结果统计</text>
  <rect x="48" y="756" width="1344" height="500" rx="16" class="surface"/>
  <rect x="48" y="756" width="220" height="500" rx="16" fill="#111827"/>
  <text x="76" y="802" class="text-white h2">投票管理</text>
  <rect x="72" y="840" width="164" height="40" rx="8" fill="#2563EB"/>
  <text x="100" y="865" class="text-white body">问卷管理</text>
  <text x="100" y="918" class="text-white body" opacity="0.72">员工账号</text>
  <text x="100" y="970" class="text-white body" opacity="0.72">结果导出</text>

  <rect x="268" y="756" width="1124" height="64" fill="#FFFFFF"/>
  <text x="300" y="796" class="text-primary h2">问卷管理</text>
  <text x="1260" y="796" class="text-muted body">李管理员</text>
  <path d="M268 820 H1392" class="line"/>

  <rect x="300" y="852" width="240" height="96" rx="12" class="muted border"/>
  <text x="324" y="884" class="text-muted small">进行中问卷</text>
  <text x="324" y="924" class="text-primary num">3</text>
  <rect x="564" y="852" width="240" height="96" rx="12" class="muted border"/>
  <text x="588" y="884" class="text-muted small">今日提交</text>
  <text x="588" y="924" class="text-primary num">28</text>
  <rect x="828" y="852" width="240" height="96" rx="12" class="muted border"/>
  <text x="852" y="884" class="text-muted small">未公开结果</text>
  <text x="852" y="924" class="text-primary num">5</text>
  <rect x="1212" y="880" width="128" height="40" rx="8" class="primary"/>
  <text x="1242" y="906" class="text-white body">新建问卷</text>

  <rect x="300" y="976" width="1040" height="238" rx="12" class="surface-flat border"/>
  <rect x="300" y="976" width="1040" height="44" rx="12" class="muted"/>
  <text x="324" y="1004" class="text-muted small">问卷标题</text>
  <text x="620" y="1004" class="text-muted small">状态</text>
  <text x="750" y="1004" class="text-muted small">提交人数</text>
  <text x="890" y="1004" class="text-muted small">公开状态</text>
  <text x="1080" y="1004" class="text-muted small">操作</text>
  <path d="M300 1020 H1340" class="line"/>
  <text x="324" y="1062" class="text-primary body">2026 年团建活动投票</text>
  <rect x="620" y="1042" width="72" height="26" rx="13" class="success-soft"/>
  <text x="636" y="1060" class="text-secondary small">进行中</text>
  <text x="750" y="1062" class="text-secondary body">28</text>
  <rect x="890" y="1042" width="72" height="26" rx="13" class="warning-soft"/>
  <text x="906" y="1060" class="text-secondary small">未公开</text>
  <text x="1080" y="1062" class="text-primary body">结果</text>
  <text x="1140" y="1062" class="text-primary body">编辑</text>
  <text x="1200" y="1062" class="text-primary body">公开</text>
  <path d="M300 1088 H1340" class="line"/>
  <text x="324" y="1130" class="text-primary body">办公区温度偏好投票</text>
  <rect x="620" y="1110" width="72" height="26" rx="13" class="warning-soft"/>
  <text x="636" y="1128" class="text-secondary small">未开始</text>
  <text x="750" y="1130" class="text-secondary body">0</text>
  <rect x="890" y="1110" width="72" height="26" rx="13" class="warning-soft"/>
  <text x="906" y="1128" class="text-secondary small">未公开</text>
  <text x="1080" y="1130" class="text-primary body">编辑</text>
  <text x="1140" y="1130" class="text-primary body">关闭</text>

  <!-- Result card overlay -->
  <rect x="920" y="1086" width="380" height="142" rx="12" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
  <text x="944" y="1120" class="text-primary h2">统计汇总</text>
  <text x="944" y="1150" class="text-secondary small">周五下午</text>
  <rect x="1024" y="1138" width="150" height="10" rx="5" fill="#E5E7EB"/>
  <rect x="1024" y="1138" width="90" height="10" rx="5" class="primary"/>
  <text x="1190" y="1150" class="text-secondary small">14票 / 50%</text>
  <text x="944" y="1184" class="text-secondary small">周六全天</text>
  <rect x="1024" y="1172" width="150" height="10" rx="5" fill="#E5E7EB"/>
  <rect x="1024" y="1172" width="60" height="10" rx="5" class="success"/>
  <text x="1190" y="1184" class="text-secondary small">9票 / 32%</text>
  <rect x="944" y="1198" width="100" height="28" rx="8" class="primary"/>
  <text x="962" y="1217" class="text-white small">导出统计</text>
  <rect x="1056" y="1198" width="122" height="28" rx="8" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="1074" y="1217" class="text-secondary small">实名明细</text>

  <!-- Section 3 Mobile -->
  <text x="48" y="1320" class="text-primary h2">移动端响应式：375px 员工投票与后台卡片化</text>
  <rect x="80" y="1344" width="300" height="420" rx="28" fill="#111827"/>
  <rect x="92" y="1360" width="276" height="388" rx="22" fill="#F3F4F6"/>
  <rect x="92" y="1360" width="276" height="54" rx="22" fill="#FFFFFF"/>
  <text x="116" y="1394" class="text-primary body" font-weight="700">问卷列表</text>
  <rect x="116" y="1438" width="228" height="116" rx="12" class="surface-flat border"/>
  <text x="132" y="1468" class="text-primary body" font-weight="700">团建活动投票</text>
  <rect x="132" y="1482" width="58" height="22" rx="11" class="success-soft"/>
  <text x="145" y="1498" class="text-secondary small">进行中</text>
  <text x="132" y="1524" class="text-muted small">截止 05-07 18:00</text>
  <rect x="252" y="1518" width="72" height="28" rx="8" class="primary"/>
  <text x="269" y="1537" class="text-white small">去投票</text>
  <rect x="116" y="1570" width="228" height="96" rx="12" class="surface-flat border"/>
  <text x="132" y="1600" class="text-primary body" font-weight="700">办公区温度投票</text>
  <rect x="132" y="1614" width="58" height="22" rx="11" class="warning-soft"/>
  <text x="145" y="1630" class="text-secondary small">未开始</text>
  <rect x="116" y="1690" width="228" height="40" rx="10" class="primary" opacity="0.28"/>
  <text x="184" y="1716" class="text-secondary small">主操作区</text>

  <rect x="440" y="1344" width="300" height="420" rx="28" fill="#111827"/>
  <rect x="452" y="1360" width="276" height="388" rx="22" fill="#F3F4F6"/>
  <text x="476" y="1400" class="text-primary body" font-weight="700">团建活动投票</text>
  <rect x="476" y="1424" width="228" height="72" rx="12" class="primary-soft"/>
  <text x="492" y="1452" class="text-primary small" font-weight="700">每人仅可提交一次</text>
  <text x="492" y="1476" class="text-secondary small">截止：05-07 18:00</text>
  <rect x="476" y="1512" width="228" height="96" rx="12" class="surface-flat border"/>
  <text x="492" y="1540" class="text-primary small" font-weight="700">1. 更希望安排在哪一天？</text>
  <circle cx="500" cy="1568" r="7" stroke="#2563EB" stroke-width="2"/>
  <circle cx="500" cy="1568" r="3" class="primary"/>
  <text x="516" y="1573" class="text-secondary small">周五下午</text>
  <circle cx="500" cy="1592" r="7" stroke="#D1D5DB" stroke-width="2"/>
  <text x="516" y="1597" class="text-secondary small">其他</text>
  <rect x="476" y="1624" width="228" height="58" rx="12" class="surface-flat border"/>
  <text x="492" y="1656" class="text-primary small" font-weight="700">2. 活动类型有哪些？</text>
  <rect x="452" y="1696" width="276" height="52" rx="0" fill="#FFFFFF"/>
  <rect x="476" y="1704" width="228" height="36" rx="10" class="primary"/>
  <text x="564" y="1727" class="text-white small">提交投票</text>

  <rect x="800" y="1344" width="560" height="420" rx="16" class="surface"/>
  <text x="832" y="1390" class="text-primary h2">后台移动端卡片化</text>
  <text x="832" y="1418" class="text-muted body">375/768 下隐藏侧边栏，表格转换为信息卡片，保留关键操作。</text>
  <rect x="832" y="1450" width="232" height="124" rx="12" class="surface-flat border"/>
  <text x="852" y="1482" class="text-primary body" font-weight="700">问卷管理卡片</text>
  <text x="852" y="1510" class="text-muted small">状态、时间、提交人数、公开状态</text>
  <rect x="852" y="1530" width="78" height="28" rx="8" class="primary"/>
  <text x="876" y="1549" class="text-white small">结果</text>
  <rect x="940" y="1530" width="78" height="28" rx="8" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="964" y="1549" class="text-secondary small">更多</text>

  <rect x="1092" y="1450" width="232" height="124" rx="12" class="surface-flat border"/>
  <text x="1112" y="1482" class="text-primary body" font-weight="700">统计结果卡片</text>
  <text x="1112" y="1510" class="text-muted small">普通员工仅显示聚合数据</text>
  <rect x="1112" y="1536" width="152" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="1112" y="1536" width="96" height="8" rx="4" class="primary"/>
  <text x="1274" y="1544" class="text-muted small">50%</text>

  <rect x="832" y="1608" width="492" height="92" rx="12" class="warning-soft"/>
  <text x="856" y="1642" class="text-primary body" font-weight="700">权限边界提示</text>
  <text x="856" y="1670" class="text-secondary body">普通员工看不到工号、姓名、部门、提交时间和实名明细；导出按钮仅管理员可见。</text>

  <!-- Legend -->
  <rect x="48" y="1730" width="1344" height="44" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
  <circle cx="78" cy="1752" r="7" class="primary"/><text x="94" y="1757" class="text-muted small">主操作</text>
  <circle cx="178" cy="1752" r="7" class="success"/><text x="194" y="1757" class="text-muted small">成功/进行中</text>
  <circle cx="306" cy="1752" r="7" class="warning"/><text x="322" y="1757" class="text-muted small">警告/未公开</text>
  <rect x="444" y="1744" width="34" height="16" rx="4" fill="#FFFFFF" stroke="#E5E7EB"/><text x="490" y="1757" class="text-muted small">卡片/表单/结果区</text>
  <text x="1160" y="1757" class="text-muted small">断点：375 / 768 / 1024 / 1440</text>
</svg>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的个人博客 - 静态原型</title>
  <meta name="description" content="一个简单的个人博客静态 HTML UI 原型，无需登录，无需数据库。" />
  <style>
    :root {
      --color-bg: #FAF7F0;
      --color-surface: #FFFFFF;
      --color-surface-soft: #F5EFE3;
      --color-text: #1F2933;
      --color-text-muted: #697586;
      --color-border: #E7DDCE;
      --color-primary: #B7791F;
      --color-primary-dark: #8A5A14;
      --color-accent: #2F6F73;
      --color-focus: #2563EB;
      --font-sans: Inter, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --space-1: .25rem;
      --space-2: .5rem;
      --space-3: .75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --radius-sm: .5rem;
      --radius-md: .875rem;
      --radius-lg: 1.25rem;
      --radius-xl: 1.5rem;
      --radius-pill: 999px;
      --shadow-sm: 0 1px 2px rgba(31, 41, 51, .06);
      --shadow-md: 0 10px 30px rgba(31, 41, 51, .08);
      --shadow-lg: 0 18px 50px rgba(31, 41, 51, .12);
      --motion-fast: 120ms;
      --motion-normal: 180ms;
      --motion-slow: 240ms;
      --ease-standard: cubic-bezier(.2,.8,.2,1);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      background:
        radial-gradient(circle at top left, rgba(183, 121, 31, .13), transparent 32rem),
        linear-gradient(180deg, #FAF7F0 0%, #FFFDF8 100%);
      color: var(--color-text);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover {
      color: var(--color-primary-dark);
    }

    button, a {
      touch-action: manipulation;
    }

    :focus-visible {
      outline: 3px solid var(--color-focus);
      outline-offset: 3px;
    }

    .skip-link {
      position: fixed;
      left: 1rem;
      top: 1rem;
      z-index: 1000;
      transform: translateY(-140%);
      padding: .75rem 1rem;
      border-radius: var(--radius-pill);
      background: var(--color-text);
      color: white;
      transition: transform var(--motion-normal) var(--ease-standard);
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(231, 221, 206, .8);
      background: rgba(250, 247, 240, .86);
      backdrop-filter: blur(16px);
    }

    .container {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    .content-container {
      width: min(760px, calc(100% - 40px));
      margin: 0 auto;
    }

    .nav-inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      gap: var(--space-3);
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--color-text);
      color: #fff;
      font-size: .875rem;
      font-weight: 800;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .nav-link {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      padding: 0 .875rem;
      border-radius: var(--radius-pill);
      color: var(--color-text-muted);
      font-size: .9375rem;
      font-weight: 700;
      transition: background var(--motion-normal) var(--ease-standard), color var(--motion-normal) var(--ease-standard);
    }

    .nav-link:hover,
    .nav-link.active {
      background: var(--color-surface-soft);
      color: var(--color-primary-dark);
    }

    main {
      min-height: calc(100dvh - 160px);
    }

    .hero {
      padding: clamp(3rem, 8vw, 6rem) 0 var(--space-12);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, .75fr);
      gap: var(--space-8);
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      min-height: 32px;
      margin: 0 0 var(--space-4);
      padding: 0 var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,.72);
      color: var(--color-accent);
      font-size: .8125rem;
      font-weight: 800;
    }

    .hero h1,
    .page-title {
      margin: 0;
      color: var(--color-text);
      font-size: clamp(2.25rem, 6vw, 4.25rem);
      line-height: 1.08;
      letter-spacing: -.055em;
    }

    .hero p {
      max-width: 680px;
      margin: var(--space-5) 0 0;
      color: var(--color-text-muted);
      font-size: clamp(1.0625rem, 2vw, 1.25rem);
      line-height: 1.8;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-3);
      margin-top: var(--space-8);
    }

    .btn {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: 0 1.25rem;
      border-radius: var(--radius-pill);
      font-weight: 800;
      transition: transform var(--motion-fast) var(--ease-standard), background var(--motion-normal) var(--ease-standard), border-color var(--motion-normal) var(--ease-standard), box-shadow var(--motion-normal) var(--ease-standard);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: scale(.98);
    }

    .btn-primary {
      background: var(--color-primary);
      color: white;
      box-shadow: 0 12px 24px rgba(183, 121, 31, .22);
    }

    .btn-primary:hover {
      background: var(--color-primary-dark);
      color: white;
    }

    .btn-secondary {
      border: 1px solid var(--color-border);
      background: rgba(255,255,255,.76);
      color: var(--color-text);
    }

    .hero-note {
      display: grid;
      gap: var(--space-4);
      padding: var(--space-6);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, .74);
      box-shadow: var(--shadow-md);
    }

    .note-row {
      display: flex;
      gap: var(--space-3);
      align-items: flex-start;
    }

    .note-icon {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      border-radius: 10px;
      background: var(--color-surface-soft);
      color: var(--color-primary-dark);
      display: grid;
      place-items: center;
      font-size: .75rem;
      font-weight: 900;
    }

    .note-row strong {
      display: block;
      margin-bottom: .125rem;
    }

    .note-row span {
      color: var(--color-text-muted);
      font-size: .9375rem;
    }

    .section {
      padding: var(--space-12) 0;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .section-title {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2rem);
      line-height: 1.2;
      letter-spacing: -.035em;
    }

    .section-description {
      margin: .5rem 0 0;
      color: var(--color-text-muted);
    }

    .text-link {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      color: var(--color-primary-dark);
      font-weight: 800;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 4px;
    }

    .post-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-5);
    }

    .post-list {
      display: grid;
      gap: var(--space-4);
    }

    .post-card {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      min-height: 100%;
      padding: var(--space-6);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,.86);
      box-shadow: var(--shadow-sm);
      transition: transform var(--motion-normal) var(--ease-standard), box-shadow var(--motion-normal) var(--ease-standard), border-color var(--motion-normal) var(--ease-standard);
    }

    .post-card:hover,
    .post-card:focus-within {
      transform: translateY(-2px);
      border-color: rgba(183, 121, 31, .42);
      box-shadow: var(--shadow-lg);
    }

    .post-meta {
      color: var(--color-text-muted);
      font-size: .875rem;
      font-weight: 700;
    }

    .post-card h3 {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.35;
      letter-spacing: -.025em;
    }

    .post-card p {
      margin: 0;
      color: var(--color-text-muted);
      line-height: 1.75;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 .625rem;
      border-radius: var(--radius-pill);
      background: var(--color-surface-soft);
      color: var(--color-accent);
      font-size: .75rem;
      font-weight: 800;
    }

    .read-more {
      min-height: 44px;
      margin-top: auto;
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      color: var(--color-primary-dark);
      font-weight: 900;
    }

    .latest-list {
      display: grid;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      background: rgba(255,255,255,.72);
    }

    .latest-item {
      display: grid;
      grid-template-columns: 130px 1fr auto;
      gap: var(--space-4);
      align-items: center;
      min-height: 72px;
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--color-border);
      transition: background var(--motion-normal) var(--ease-standard);
    }

    .latest-item:last-child { border-bottom: 0; }
    .latest-item:hover { background: rgba(245, 239, 227, .68); }

    .latest-date {
      color: var(--color-text-muted);
      font-size: .875rem;
      font-weight: 700;
    }

    .latest-title {
      font-weight: 850;
    }

    .latest-arrow {
      color: var(--color-primary-dark);
      font-weight: 900;
    }

    .page-hero {
      padding: var(--space-12) 0 var(--space-8);
    }

    .page-title {
      font-size: clamp(2rem, 5vw, 3.25rem);
    }

    .page-intro {
      max-width: 680px;
      margin: var(--space-4) 0 0;
      color: var(--color-text-muted);
      font-size: 1.125rem;
      line-height: 1.8;
    }

    .article-shell {
      padding: var(--space-10) 0 var(--space-16);
    }

    .back-link {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      margin-bottom: var(--space-6);
      color: var(--color-primary-dark);
      font-weight: 850;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .article {
      padding: clamp(1.5rem, 5vw, 3rem);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,.9);
      box-shadow: var(--shadow-md);
    }

    .article h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.25rem);
      line-height: 1.12;
      letter-spacing: -.05em;
    }

    .article-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      align-items: center;
      margin: var(--space-5) 0 var(--space-8);
      color: var(--color-text-muted);
      font-size: .9375rem;
      font-weight: 700;
    }

    .article-body {
      color: var(--color-text);
      font-size: 1.0625rem;
      line-height: 1.85;
    }

    .article-body h2 {
      margin: 2.25em 0 .75em;
      font-size: 1.5rem;
      line-height: 1.25;
      letter-spacing: -.025em;
    }

    .article-body p {
      margin: 0 0 1.25em;
    }

    .article-body blockquote {
      margin: 2rem 0;
      padding: 1rem 1.25rem;
      border-left: 4px solid var(--color-primary);
      border-radius: var(--radius-md);
      background: var(--color-surface-soft);
      color: var(--color-text);
    }

    .article-footer-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      margin-top: var(--space-8);
      padding-top: var(--space-6);
      border-top: 1px solid var(--color-border);
    }

    .empty-state {
      padding: var(--space-10);
      border: 1px dashed var(--color-border);
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,.7);
      text-align: center;
    }

    .site-footer {
      border-top: 1px solid var(--color-border);
      padding: var(--space-8) 0;
      color: var(--color-text-muted);
      font-size: .9375rem;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    @media (max-width: 900px) {
      .hero-grid {
        grid-template-columns: 1fr;
      }
      .post-grid {
        grid-template-columns: 1fr;
      }
      .latest-item {
        grid-template-columns: 1fr;
        gap: var(--space-1);
      }
      .latest-arrow {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .container,
      .content-container {
        width: min(100% - 32px, 1120px);
      }
      .nav-inner {
        min-height: auto;
        padding: .75rem 0;
        align-items: flex-start;
        flex-direction: column;
      }
      .nav-links {
        width: 100%;
      }
      .nav-link {
        flex: 1;
        justify-content: center;
      }
      .hero {
        padding-top: var(--space-10);
      }
      .section-header {
        align-items: flex-start;
        flex-direction: column;
      }
      .post-card,
      .article {
        border-radius: var(--radius-lg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">跳到主内容</a>

  <header class="site-header">
    <div class="container nav-inner">
      <a class="brand" href="#/" aria-label="返回博客首页">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span>我的个人博客</span>
      </a>
      <nav class="nav-links" aria-label="主导航">
        <a class="nav-link" data-route="home" href="#/">首页</a>
        <a class="nav-link" data-route="posts" href="#/posts">文章列表</a>
      </nav>
    </div>
  </header>

  <main id="main" tabindex="-1"></main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© 2026 我的个人博客</span>
      <span>静态展示 · 无需登录 · 无需数据库</span>
    </div>
  </footer>

  <script>
    const posts = [
      {
        id: 'hello-blog',
        title: '我的第一篇博客',
        date: '2026-04-27',
        tags: ['随笔', '个人博客'],
        summary: '这是我的第一篇个人博客文章，用来记录博客的开始，也介绍这个静态博客存在的意义。',
        content: `
          <p>欢迎来到我的个人博客。</p>
          <p>这里会记录我的技术学习、生活观察和一些阶段性的思考。相比复杂的平台功能，我更希望这个地方足够简单、稳定，并且能够长期保存内容。</p>
          <h2>为什么从简单开始</h2>
          <p>一个个人博客最重要的不是功能数量，而是能否让内容被清楚地阅读。无需登录、无需数据库、无需后台管理，意味着它可以更轻量地部署，也更容易维护。</p>
          <blockquote>简单不是缺少设计，而是把真正重要的内容留下来。</blockquote>
          <p>后续如果需要扩展，可以再逐步增加关于我、标签、归档和搜索等功能。但在第一版中，首页、文章列表和文章详情已经足够承载核心阅读体验。</p>
        `
      },
      {
        id: 'why-write',
        title: '为什么要写博客',
        date: '2026-04-28',
        tags: ['写作', '成长'],
        summary: '写博客是一种整理思考和沉淀经验的方式，也是一种与未来的自己对话的方法。',
        content: `
          <p>写博客不仅是为了分享，也是为了帮助自己梳理知识。</p>
          <p>当我们把想法写下来时，很多模糊的问题会变得更加清晰。文字迫使我们组织概念、补全逻辑，并意识到自己真正理解了什么。</p>
          <h2>写作带来的长期价值</h2>
          <p>博客像一个公开的知识仓库。它不一定每天更新，但每一篇认真写下的文章，都会成为未来可以回看的线索。</p>
          <p>对于个人而言，这种积累也会慢慢形成独特的表达方式和知识地图。</p>
        `
      },
      {
        id: 'keep-simple',
        title: '保持简单',
        date: '2026-04-29',
        tags: ['生活', '思考'],
        summary: '简单的东西往往更容易长期坚持，一个博客也可以从最小可用版本开始。',
        content: `
          <p>一个简单的博客，不需要复杂的系统。</p>
          <p>只要可以稳定地展示内容，就已经满足了最核心的需求。复杂功能当然有价值，但它们应该在真实需要出现之后再加入。</p>
          <h2>少即是多</h2>
          <p>保持简单可以减少维护成本，也能让访问者更快进入阅读状态。界面越克制，文字本身就越容易被看见。</p>
          <p>这也是本原型选择浅色背景、清晰排版和少量交互的原因。</p>
        `
      }
    ];

    const main = document.querySelector('#main');

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function postCard(post) {
      return `
        <article class="post-card">
          <div class="post-meta">${escapeHtml(post.date)}</div>
          <h3><a href="#/post/${escapeHtml(post.id)}">${escapeHtml(post.title)}</a></h3>
          <p>${escapeHtml(post.summary)}</p>
          <div class="tags" aria-label="文章标签">
            ${post.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
          </div>
          <a class="read-more" href="#/post/${escapeHtml(post.id)}" aria-label="阅读全文：${escapeHtml(post.title)}">阅读全文 →</a>
        </article>
      `;
    }

    function renderHome() {
      const featured = posts.slice(0, 3).map(postCard).join('');
      const latest = posts.map(post => `
        <a class="latest-item" href="#/post/${escapeHtml(post.id)}">
          <span class="latest-date">${escapeHtml(post.date)}</span>
          <span class="latest-title">${escapeHtml(post.title)}</span>
          <span class="latest-arrow" aria-hidden="true">→</span>
        </a>
      `).join('');

      main.innerHTML = `
        <section class="hero">
          <div class="container hero-grid">
            <div>
              <p class="eyebrow">静态个人博客 · 内容优先</p>
              <h1>记录技术、生活与思考。</h1>
              <p>这是一个简单、清爽、无需登录和数据库的个人博客。你可以在这里浏览文章列表，也可以进入详情页专注阅读。</p>
              <div class="hero-actions">
                <a class="btn btn-primary" href="#/posts">查看全部文章</a>
                <a class="btn btn-secondary" href="#/post/hello-blog">阅读第一篇</a>
              </div>
            </div>
            <aside class="hero-note" aria-label="博客特点">
              <div class="note-row">
                <span class="note-icon" aria-hidden="true">01</span>
                <div><strong>无需登录</strong><span>所有访客都可以直接浏览内容。</span></div>
              </div>
              <div class="note-row">
                <span class="note-icon" aria-hidden="true">02</span>
                <div><strong>无需数据库</strong><span>文章内容通过静态数据维护。</span></div>
              </div>
              <div class="note-row">
                <span class="note-icon" aria-hidden="true">03</span>
                <div><strong>适合阅读</strong><span>控制正文宽度与行高，减少视觉干扰。</span></div>
              </div>
            </aside>
          </div>
        </section>

        <section class="section">
          <div class="container">
            <div class="section-header">
              <div>
                <h2 class="section-title">精选文章</h2>
                <p class="section-description">从最近的几篇内容开始阅读。</p>
              </div>
              <a class="text-link" href="#/posts">全部文章</a>
            </div>
            <div class="post-grid">${featured}</div>
          </div>
        </section>

        <section class="section">
          <div class="container">
            <div class="section-header">
              <div>
                <h2 class="section-title">最新文章</h2>
                <p class="section-description">按发布时间倒序展示。</p>
              </div>
            </div>
            <div class="latest-list">${latest}</div>
          </div>
        </section>
      `;
    }

    function renderPosts() {
      main.innerHTML = `
        <section class="page-hero">
          <div class="container">
            <p class="eyebrow">Article List</p>
            <h1 class="page-title">文章列表</h1>
            <p class="page-intro">这里展示全部静态文章。点击标题或“阅读全文”即可进入文章详情页。</p>
          </div>
        </section>
        <section class="section" style="padding-top: 0;">
          <div class="container">
            ${posts.length ? `<div class="post-list">${posts.map(postCard).join('')}</div>` : `<div class="empty-state">暂无文章，稍后再来看看。</div>`}
          </div>
        </section>
      `;
    }

    function renderPost(id) {
      const post = posts.find(item => item.id === id);
      if (!post) {
        main.innerHTML = `
          <section class="article-shell">
            <div class="content-container">
              <a class="back-link" href="#/posts">← 返回文章列表</a>
              <div class="empty-state">
                <h1>文章不存在</h1>
                <p>你访问的文章可能已被移除，或链接地址不正确。</p>
                <a class="btn btn-primary" href="#/posts">查看全部文章</a>
              </div>
            </div>
          </section>
        `;
        return;
      }

      main.innerHTML = `
        <section class="article-shell">
          <div class="content-container">
            <a class="back-link" href="#/posts">← 返回文章列表</a>
            <article class="article">
              <h1>${escapeHtml(post.title)}</h1>
              <div class="article-meta">
                <span>发布时间：${escapeHtml(post.date)}</span>
                <span aria-hidden="true">·</span>
                <span class="tags">${post.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</span>
              </div>
              <div class="article-body">${post.content}</div>
              <div class="article-footer-actions">
                <a class="btn btn-primary" href="#/posts">返回文章列表</a>
                <a class="btn btn-secondary" href="#/">回到首页</a>
              </div>
            </article>
          </div>
        </section>
      `;
    }

    function setActive(route) {
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.dataset.route === route);
      });
    }

    function router() {
      const hash = window.location.hash || '#/';
      const path = hash.replace(/^#/, '');

      if (path === '/' || path === '') {
        renderHome();
        setActive('home');
      } else if (path === '/posts') {
        renderPosts();
        setActive('posts');
      } else if (path.startsWith('/post/')) {
        renderPost(decodeURIComponent(path.replace('/post/', '')));
        setActive('posts');
      } else {
        renderHome();
        setActive('home');
      }

      requestAnimationFrame(() => {
        main.focus({ preventScroll: true });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    window.addEventListener('hashchange', router);
    router();
  </script>
</body>
</html>

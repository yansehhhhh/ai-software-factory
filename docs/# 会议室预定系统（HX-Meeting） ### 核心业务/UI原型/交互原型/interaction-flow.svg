<svg width="430" height="1320" viewBox="0 0 430 1320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="430" height="1320" rx="36" fill="#F8FAFC"/>
  <rect width="430" height="54" rx="36" fill="#0F172A"/>
  <text x="24" y="92" fill="#1F2937" font-size="24" font-family="Arial, sans-serif" font-weight="700">HX-Meeting H5 交互流程</text>
  <text x="24" y="118" fill="#6B7280" font-size="13" font-family="Arial, sans-serif">首页、预约、签到、通知、转让确认和管理入口移动流程</text>

  <g font-family="Arial, sans-serif">
    <rect x="92" y="150" width="246" height="72" rx="20" fill="#0F172A"/>
    <text x="176" y="193" fill="#FFFFFF" font-size="20" font-weight="700">H5 登录</text>

    <path d="M215 222V262" stroke="#64748B" stroke-width="3"/><polygon points="215,262 207,248 223,248" fill="#64748B"/>

    <text x="44" y="980" fill="#6B7280" font-size="12">去签到 / 转让 / 释放</text>
    <text x="44" y="1000" fill="#DC2626" font-size="12">违规释放状态</text>
    <path d="M240 882C210 904 172 918 110 918" stroke="#64748B" stroke-width="3" fill="none"/><polygon points="110,918 124,910 124,926" fill="#64748B"/>

    <rect x="234" y="918" width="172" height="104" rx="20" fill="#F8FBFF" stroke="#93C5FD" stroke-dasharray="6 6"/>
    <text x="260" y="954" fill="#1F2937" font-size="18" font-weight="700">会议室管理</text>
    <text x="254" y="980" fill="#6B7280" font-size="12">管理员首页入口</text>

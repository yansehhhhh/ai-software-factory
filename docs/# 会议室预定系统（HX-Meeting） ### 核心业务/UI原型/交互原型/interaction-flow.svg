    <path d="M322 358C350 398 360 430 360 470" stroke="#64748B" stroke-width="3" fill="none"/><polygon points="360,470 352,456 368,456" fill="#64748B"/>

    <rect x="24" y="470" width="132" height="96" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>

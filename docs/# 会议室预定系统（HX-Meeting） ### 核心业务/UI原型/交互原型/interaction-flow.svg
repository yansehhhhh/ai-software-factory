    <path d="M306 358C392 450 404 760 320 918" stroke="#93C5FD" stroke-width="3" stroke-dasharray="8 8" fill="none"/><polygon points="320,918 316,902 331,908" fill="#93C5FD"/>

    <rect x="64" y="1064" width="302" height="112" rx="22" fill="#FFF7F7" stroke="#FECACA"/>
    <text x="154" y="1100" fill="#991B1B" font-size="18" font-weight="700">自动释放 / 权限禁用</text>
    <text x="88" y="1128" fill="#7F1D1D" font-size="12">开始后 15 分钟无人签到 → 释放剩余时段</text>
    <text x="88" y="1148" fill="#7F1D1D" font-size="12">自然月 3 次违规 → 禁用 7 天；仍可签到与查看</text>
    <path d="M110 1022C122 1050 150 1060 215 1064" stroke="#991B1B" stroke-width="3" fill="none"/><polygon points="215,1064 200,1056 201,1072" fill="#991B1B"/>

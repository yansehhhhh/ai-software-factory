    <text x="338" y="532" fill="#6B7280" font-size="12">待办</text>
    <text x="338" y="552" fill="#6B7280" font-size="12">未读</text>

    <path d="M90 566V626" stroke="#64748B" stroke-width="3"/><polygon points="90,626 82,612 98,612" fill="#64748B"/>
    <rect x="24" y="626" width="184" height="104" rx="20" fill="#FFFFFF" stroke="#BFDBFE"/>
    <text x="54" y="662" fill="#1F2937" font-size="18" font-weight="700">底部预约表单</text>

    <text x="86" y="326" fill="#6B7280" font-size="13">待办优先 / 快捷入口 / 今日会议 / 底部导航</text>

    <path d="M108 358C80 398 70 430 70 470" stroke="#64748B" stroke-width="3" fill="none"/><polygon points="70,470 62,456 78,456" fill="#64748B"/>

  <text x="196" y="1284" fill="#64748B" font-size="12" font-family="Arial, sans-serif" font-weight="700">我的预约</text>
  <text x="300" y="1284" fill="#64748B" font-size="12" font-family="Arial, sans-serif" font-weight="700">核销</text>
  <text x="370" y="1284" fill="#64748B" font-size="12" font-family="Arial, sans-serif" font-weight="700">通知</text>

<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="720" viewBox="0 0 1024 720" role="img" aria-labelledby="title desc">
  <title id="title">公司内部投票网页移动端适配预览图</title>
  <desc id="desc">对比 Mobile、Tablet、Desktop 三种断点下的投票详情和结果展示布局。</desc>
  <defs><style>.bg{fill:#F9FAFB}.frame{fill:#fff;stroke:#E5E7EB;stroke-width:1.5}.screen{fill:#F9FAFB}.primary{fill:#2563EB}.pale{fill:#DBEAFE}.text{fill:#111827;font-family:system-ui}.muted{fill:#4B5563;font-family:system-ui}.weak{fill:#9CA3AF;font-family:system-ui}.info{fill:#0EA5E9}.success{fill:#16A34A}.h1{font-size:22px;font-weight:800}.h2{font-size:16px;font-weight:700}.b{font-size:13px}.s{font-size:11px}.pill{font-size:10px;font-weight:700}</style><filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.12"/></filter></defs>
  <rect class="bg" width="1024" height="720"/><text x="40" y="52" class="text h1">响应式适配预览</text><text x="40" y="80" class="muted b">Mobile：单列 + 底部导航；Tablet：内容单列/双列混合；Desktop：侧边栏 + 多列图表</text>

  <g transform="translate(40 120)" filter="url(#shadow)">
    <text x="0" y="-22" class="text h2">Mobile 375px</text>
    <rect width="250" height="540" rx="28" class="frame"/><rect x="12" y="18" width="226" height="504" rx="20" class="screen"/>
    <rect x="12" y="18" width="226" height="48" rx="20" fill="#fff"/><rect x="28" y="30" width="24" height="24" rx="8" class="primary"/><text x="60" y="47" class="text b" font-weight="700">内部投票</text>
    <text x="28" y="92" class="info s" font-weight="700">员工端 / 投票详情</text><text x="28" y="120" class="text h2">内部办公体验反馈</text><text x="28" y="142" class="muted s">截止 2026-05-15 18:00</text>
    <rect x="28" y="158" width="194" height="42" rx="10" fill="#E0F2FE" stroke="#BAE6FD"/><text x="40" y="182" class="info s" font-weight="700">匿名投票 · 不展示答案映射</text>
    <rect x="28" y="216" width="194" height="96" rx="14" fill="#fff" stroke="#E5E7EB"/><text x="42" y="242" class="text b" font-weight="700">1. 满意度评分</text><rect x="42" y="260" width="32" height="32" rx="9" fill="#fff" stroke="#E5E7EB"/><rect x="82" y="260" width="32" height="32" rx="9" class="primary"/><rect x="122" y="260" width="32" height="32" rx="9" fill="#fff" stroke="#E5E7EB"/>
    <rect x="28" y="326" width="194" height="104" rx="14" fill="#fff" stroke="#E5E7EB"/><text x="42" y="352" class="text b" font-weight="700">2. 改善方面</text><rect x="42" y="370" width="166" height="28" rx="9" class="pale" stroke="#2563EB"/><text x="54" y="389" class="text s">会议室预约体验</text><rect x="42" y="404" width="166" height="28" rx="9" class="pale" stroke="#2563EB"/><text x="54" y="423" class="text s">办公网络稳定性</text>
    <rect x="12" y="452" width="226" height="54" fill="#fff" stroke="#E5E7EB"/><rect x="28" y="462" width="194" height="34" rx="10" class="primary"/><text x="100" y="484" fill="#fff" font-family="system-ui" font-size="12" font-weight="700">提交投票</text>
    <rect x="12" y="506" width="226" height="16" fill="#fff"/>
  </g>

  <g transform="translate(340 120)" filter="url(#shadow)">
    <text x="0" y="-22" class="text h2">Tablet 768px</text>
    <rect width="300" height="540" rx="20" class="frame"/><rect x="12" y="18" width="276" height="504" rx="14" class="screen"/>
    <rect x="12" y="18" width="276" height="54" fill="#fff"/><rect x="28" y="32" width="26" height="26" rx="8" class="primary"/><text x="64" y="50" class="text b" font-weight="700">内部投票系统</text><rect x="220" y="32" width="50" height="24" rx="12" fill="#E0F2FE"/><text x="232" y="48" class="info s" font-weight="700">平板</text>
    <text x="28" y="108" class="info s" font-weight="700">结果页 / 图表化统计</text><text x="28" y="136" class="text h2">年度优秀项目评选</text><text x="28" y="158" class="muted s">已结束，所有员工可查看汇总结果</text>
    <rect x="28" y="180" width="112" height="72" rx="14" fill="#fff" stroke="#E5E7EB"/><text x="44" y="204" class="muted s">参与人数</text><text x="44" y="236" class="text h1">356</text><rect x="156" y="180" width="112" height="72" rx="14" fill="#fff" stroke="#E5E7EB"/><text x="172" y="204" class="muted s">参与率</text><text x="172" y="236" class="text h1">84%</text>
    <rect x="28" y="272" width="240" height="170" rx="14" fill="#fff" stroke="#E5E7EB"/><text x="44" y="300" class="text b" font-weight="700">横向条形图</text><text x="44" y="332" class="muted s">选项 A</text><rect x="100" y="324" width="112" height="10" rx="5" fill="#EEF2FF"/><rect x="100" y="324" width="56" height="10" rx="5" class="primary"/><text x="222" y="334" class="text s">50%</text><text x="44" y="368" class="muted s">选项 B</text><rect x="100" y="360" width="112" height="10" rx="5" fill="#EEF2FF"/><rect x="100" y="360" width="34" height="10" rx="5" class="info"/><text x="222" y="370" class="text s">30%</text>
  </g>

  <g transform="translate(690 120)" filter="url(#shadow)">
    <text x="0" y="-22" class="text h2">Desktop ≥1200px</text>
    <rect width="294" height="540" rx="16" class="frame"/><rect x="12" y="18" width="270" height="504" rx="10" class="screen"/>
    <rect x="12" y="18" width="270" height="48" fill="#fff"/><rect x="28" y="30" width="24" height="24" rx="8" class="primary"/><text x="60" y="47" class="text b" font-weight="700">内部投票系统</text>
    <rect x="12" y="66" width="70" height="456" fill="#fff" stroke="#E5E7EB"/><rect x="22" y="86" width="50" height="28" rx="8" class="pale"/><text x="31" y="104" class="info s" font-weight="700">工作台</text><text x="28" y="146" class="muted s">创建</text><text x="28" y="184" class="muted s">管理</text><text x="28" y="222" class="muted s">导入</text>
    <text x="98" y="104" class="info s" font-weight="700">管理端</text><text x="98" y="132" class="text h2">投票管理概览</text>
    <rect x="98" y="154" width="72" height="58" rx="12" fill="#fff" stroke="#E5E7EB"/><text x="110" y="176" class="muted s">进行中</text><text x="110" y="202" class="text h2">8</text><rect x="184" y="154" width="72" height="58" rx="12" fill="#fff" stroke="#E5E7EB"/><text x="196" y="176" class="muted s">已结束</text><text x="196" y="202" class="text h2">26</text>
    <rect x="98" y="234" width="158" height="118" rx="12" fill="#fff" stroke="#E5E7EB"/><text x="112" y="260" class="text b" font-weight="700">创建投票</text><rect x="112" y="278" width="130" height="26" rx="8" fill="#fff" stroke="#D1D5DB"/><rect x="112" y="316" width="70" height="24" rx="12" class="primary"/><text x="128" y="332" fill="#fff" font-family="system-ui" font-size="10" font-weight="700">匿名</text>
    <rect x="98" y="370" width="158" height="112" rx="12" fill="#fff" stroke="#E5E7EB"/><text x="112" y="396" class="text b" font-weight="700">结果图表</text><rect x="112" y="418" width="90" height="10" rx="5" fill="#EEF2FF"/><rect x="112" y="418" width="45" height="10" rx="5" class="primary"/><text x="212" y="429" class="text s">50%</text><rect x="112" y="450" width="90" height="10" rx="5" fill="#EEF2FF"/><rect x="112" y="450" width="27" height="10" rx="5" class="info"/><text x="212" y="461" class="text s">30%</text>
  </g>
</svg>

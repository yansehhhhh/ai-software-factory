<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1080" viewBox="0 0 1440 1080" role="img" aria-labelledby="title desc">
  <title id="title">公司内部投票网页桌面端设计图</title>
  <desc id="desc">展示管理员工作台、创建投票、员工投票详情和结果统计的桌面端原型总览。</desc>
  <defs>
    <style>
      .bg{fill:#F9FAFB}.card{fill:#fff;stroke:#E5E7EB;stroke-width:1}.primary{fill:#2563EB}.pale{fill:#DBEAFE}.text{fill:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.muted{fill:#4B5563;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.weak{fill:#9CA3AF;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.success{fill:#16A34A}.warn{fill:#F59E0B}.danger{fill:#DC2626}.info{fill:#0EA5E9}.line{stroke:#E5E7EB;stroke-width:1}.h1{font-size:24px;font-weight:700}.h2{font-size:18px;font-weight:700}.body{font-size:14px}.small{font-size:12px}.metric{font-size:28px;font-weight:800}.pilltext{font-size:12px;font-weight:700}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.08"/></filter>
  </defs>
  <rect class="bg" width="1440" height="1080"/>
  <rect x="0" y="0" width="1440" height="64" fill="#fff" stroke="#E5E7EB"/>
  <rect x="24" y="16" width="32" height="32" rx="10" class="primary"/>
  <circle cx="40" cy="32" r="8" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="68" y="38" class="text h2">内部投票系统</text>
  <rect x="1266" y="18" width="64" height="28" rx="14" fill="#E0F2FE"/><text x="1280" y="37" class="info pilltext">管理员</text>
  <circle cx="1358" cy="32" r="16" class="pale"/><text x="1351" y="38" class="primary body" font-weight="700">王</text>
  <text x="1382" y="37" class="muted body">退出</text>

  <rect x="0" y="64" width="240" height="1016" fill="#fff" stroke="#E5E7EB"/>
  <rect x="18" y="88" width="204" height="44" rx="10" class="pale"/><text x="54" y="116" class="primary body" font-weight="700">工作台</text>
  <text x="54" y="172" class="muted body">创建投票</text><text x="54" y="224" class="muted body">投票管理</text><text x="54" y="276" class="muted body">员工导入</text><text x="54" y="328" class="muted body">结果查看</text>

  <text x="272" y="112" class="primary small" font-weight="700">管理端 / 工作台</text>
  <text x="272" y="148" class="text h1">投票管理概览</text>
  <text x="272" y="176" class="muted body">创建后立即开始，只设置结束时间；所有员工默认可参与。</text>
  <rect x="1208" y="106" width="136" height="44" rx="10" class="primary"/><text x="1246" y="134" fill="#fff" font-family="system-ui" font-size="14" font-weight="700">创建投票</text>

  <g filter="url(#shadow)">
    <rect x="272" y="208" width="320" height="128" rx="16" class="card"/><text x="296" y="244" class="muted body">进行中投票</text><text x="296" y="292" class="text metric">8</text>
    <rect x="616" y="208" width="320" height="128" rx="16" class="card"/><text x="640" y="244" class="muted body">已结束投票</text><text x="640" y="292" class="text metric">26</text>
    <rect x="960" y="208" width="384" height="128" rx="16" class="card"/><text x="984" y="244" class="muted body">总参与次数</text><text x="984" y="292" class="text metric">3,842</text>
  </g>

  <rect x="272" y="368" width="1072" height="258" rx="16" class="card" filter="url(#shadow)"/>
  <text x="296" y="408" class="text h2">最近投票</text>
  <line x1="296" y1="432" x2="1320" y2="432" class="line"/>
  <text x="296" y="462" class="weak small">标题</text><text x="680" y="462" class="weak small">状态</text><text x="850" y="462" class="weak small">参与进度</text><text x="1170" y="462" class="weak small">操作</text>
  <text x="296" y="510" class="text body">内部办公体验反馈</text><rect x="680" y="488" width="64" height="26" rx="13" class="pale"/><text x="694" y="506" class="primary pilltext">进行中</text><rect x="850" y="496" width="230" height="12" rx="6" fill="#EEF2FF"/><rect x="850" y="496" width="120" height="12" rx="6" class="primary"/><text x="1096" y="510" class="muted body">218/420</text><rect x="1170" y="484" width="86" height="36" rx="10" fill="#fff" stroke="#2563EB"/><text x="1198" y="507" class="primary body" font-weight="700">管理</text>
  <line x1="296" y1="540" x2="1320" y2="540" class="line"/>
  <text x="296" y="586" class="text body">年度优秀项目评选</text><rect x="680" y="564" width="64" height="26" rx="13" fill="#F3F4F6"/><text x="694" y="582" class="muted pilltext">已结束</text><rect x="850" y="572" width="230" height="12" rx="6" fill="#EEF2FF"/><rect x="850" y="572" width="196" height="12" rx="6" class="primary"/><text x="1096" y="586" class="muted body">356/420</text><rect x="1170" y="560" width="86" height="36" rx="10" fill="#fff" stroke="#2563EB"/><text x="1198" y="583" class="primary body" font-weight="700">结果</text>

  <rect x="272" y="666" width="520" height="350" rx="16" class="card" filter="url(#shadow)"/>
  <text x="296" y="704" class="text h2">创建投票 - 关键配置</text>
  <text x="296" y="742" class="muted body">投票标题 *</text><rect x="296" y="754" width="448" height="40" rx="10" fill="#fff" stroke="#D1D5DB"/><text x="310" y="780" class="text body">内部办公体验反馈</text>
  <text x="296" y="824" class="muted body">结束时间 *</text><rect x="296" y="836" width="448" height="40" rx="10" fill="#fff" stroke="#D1D5DB"/><text x="310" y="862" class="text body">2026-05-15 18:00</text>
  <rect x="296" y="900" width="92" height="34" rx="17" class="primary"/><text x="318" y="922" fill="#fff" font-family="system-ui" font-size="12" font-weight="700">匿名投票</text><rect x="400" y="900" width="92" height="34" rx="17" fill="#fff" stroke="#E5E7EB"/><text x="422" y="922" class="muted pilltext">实名投票</text>
  <rect x="296" y="952" width="180" height="40" rx="10" class="primary"/><text x="322" y="978" fill="#fff" font-family="system-ui" font-size="14" font-weight="700">创建并立即开始</text>

  <rect x="824" y="666" width="520" height="350" rx="16" class="card" filter="url(#shadow)"/>
  <text x="848" y="704" class="text h2">结果统计 - 图表区</text>
  <text x="848" y="742" class="muted body">单选题：优秀项目选择</text>
  <text x="848" y="780" class="text body">智能客服平台</text><rect x="990" y="770" width="250" height="12" rx="6" fill="#EEF2FF"/><rect x="990" y="770" width="125" height="12" rx="6" class="primary"/><text x="1260" y="783" class="text body">50%</text>
  <text x="848" y="824" class="text body">数据中台升级</text><rect x="990" y="814" width="250" height="12" rx="6" fill="#EEF2FF"/><rect x="990" y="814" width="75" height="12" rx="6" class="info"/><text x="1260" y="827" class="text body">30%</text>
  <text x="848" y="868" class="text body">移动办公优化</text><rect x="990" y="858" width="250" height="12" rx="6" fill="#EEF2FF"/><rect x="990" y="858" width="50" height="12" rx="6" class="success"/><text x="1260" y="871" class="text body">20%</text>
  <text x="848" y="930" class="muted body">参与人数 356 · 参与率 84.8% · 平均分 4.2</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="390" height="1560" viewBox="0 0 390 1560" role="img" aria-labelledby="title desc">
  <title id="title">公司内部投票网页移动端设计图</title>
  <desc id="desc">展示移动端登录后投票列表、投票详情、提交确认和结果统计页面。</desc>
  <defs><style>.bg{fill:#F9FAFB}.card{fill:#fff;stroke:#E5E7EB}.primary{fill:#2563EB}.pale{fill:#DBEAFE}.text{fill:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.muted{fill:#4B5563;font-family:system-ui}.weak{fill:#9CA3AF;font-family:system-ui}.info{fill:#0EA5E9}.success{fill:#16A34A}.warn{fill:#F59E0B}.danger{fill:#DC2626}.h1{font-size:22px;font-weight:700}.h2{font-size:17px;font-weight:700}.body{font-size:14px}.small{font-size:12px}.metric{font-size:26px;font-weight:800}.pill{font-size:11px;font-weight:700}</style><filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.08"/></filter></defs>
  <rect class="bg" width="390" height="1560"/>
  <rect x="0" y="0" width="390" height="60" fill="#fff" stroke="#E5E7EB"/>
  <rect x="16" y="14" width="32" height="32" rx="10" class="primary"/><circle cx="32" cy="30" r="8" fill="none" stroke="#fff" stroke-width="2"/><text x="58" y="36" class="text h2">内部投票系统</text><circle cx="350" cy="30" r="16" class="pale"/><text x="343" y="36" class="primary body" font-weight="700">张</text>

  <text x="16" y="96" class="primary small" font-weight="700">员工端 / 投票列表</text><text x="16" y="128" class="text h1">待参与与结果查看</text><text x="16" y="154" class="muted body">员工登录后 3 步内完成投票提交。</text>
  <rect x="16" y="178" width="52" height="34" rx="17" class="primary"/><text x="31" y="200" fill="#fff" font-family="system-ui" font-size="12" font-weight="700">全部</text><rect x="76" y="178" width="64" height="34" rx="17" fill="#fff" stroke="#E5E7EB"/><text x="90" y="200" class="muted pill">进行中</text><rect x="148" y="178" width="64" height="34" rx="17" fill="#fff" stroke="#E5E7EB"/><text x="162" y="200" class="muted pill">已结束</text><rect x="220" y="178" width="72" height="34" rx="17" fill="#fff" stroke="#E5E7EB"/><text x="234" y="200" class="muted pill">我已提交</text>

  <rect x="16" y="232" width="358" height="150" rx="16" class="card" filter="url(#shadow)"/><text x="34" y="264" class="text h2">内部办公体验反馈</text><text x="34" y="292" class="muted body">请反馈近期办公体验，用于后续优化。</text><rect x="34" y="310" width="58" height="24" rx="12" class="pale"/><text x="46" y="327" class="primary pill">进行中</text><rect x="100" y="310" width="70" height="24" rx="12" fill="#E0F2FE"/><text x="113" y="327" class="info pill">匿名投票</text><rect x="34" y="346" width="104" height="32" rx="10" class="primary"/><text x="65" y="367" fill="#fff" font-family="system-ui" font-size="13" font-weight="700">去投票</text>
  <rect x="16" y="398" width="358" height="124" rx="16" class="card"/><text x="34" y="430" class="text h2">2026 年团建地点投票</text><text x="34" y="458" class="muted body">请选择你最希望参加团建的地点。</text><rect x="34" y="476" width="58" height="24" rx="12" fill="#DCFCE7"/><text x="46" y="493" class="success pill">已提交</text><rect x="104" y="476" width="72" height="24" rx="12" fill="#F3F4F6"/><text x="118" y="493" class="muted pill">不可修改</text>

  <line x1="16" y1="554" x2="374" y2="554" stroke="#E5E7EB"/><text x="16" y="596" class="primary small" font-weight="700">投票详情</text><text x="16" y="628" class="text h1">内部办公体验反馈</text><text x="16" y="654" class="muted body">截止 2026-05-15 18:00</text>
  <rect x="16" y="674" width="358" height="56" rx="12" fill="#E0F2FE" stroke="#BAE6FD"/><text x="32" y="697" class="info body" font-weight="700">匿名投票</text><text x="32" y="718" class="muted small">不会展示投票人与答案对应关系。</text>
  <rect x="16" y="746" width="358" height="128" rx="16" class="card"/><text x="34" y="778" class="text h2">1. 满意度评分</text><rect x="34" y="804" width="44" height="44" rx="12" fill="#fff" stroke="#E5E7EB"/><text x="52" y="832" class="muted body">1</text><rect x="88" y="804" width="44" height="44" rx="12" fill="#fff" stroke="#E5E7EB"/><text x="106" y="832" class="muted body">2</text><rect x="142" y="804" width="44" height="44" rx="12" fill="#fff" stroke="#E5E7EB"/><text x="160" y="832" class="muted body">3</text><rect x="196" y="804" width="44" height="44" rx="12" class="primary"/><text x="214" y="832" fill="#fff" font-family="system-ui" font-size="14">4</text><rect x="250" y="804" width="44" height="44" rx="12" fill="#fff" stroke="#E5E7EB"/><text x="268" y="832" class="muted body">5</text>
  <rect x="16" y="890" width="358" height="176" rx="16" class="card"/><text x="34" y="922" class="text h2">2. 优先改善方面</text><rect x="34" y="944" width="322" height="40" rx="12" fill="#DBEAFE" stroke="#2563EB"/><rect x="48" y="955" width="18" height="18" rx="5" class="primary"/><text x="78" y="970" class="text body">会议室预约体验</text><rect x="34" y="994" width="322" height="40" rx="12" fill="#DBEAFE" stroke="#2563EB"/><rect x="48" y="1005" width="18" height="18" rx="5" class="primary"/><text x="78" y="1020" class="text body">办公网络稳定性</text>
  <rect x="16" y="1082" width="358" height="132" rx="16" class="card"/><text x="34" y="1114" class="text h2">3. 文本反馈</text><rect x="34" y="1130" width="322" height="66" rx="12" fill="#fff" stroke="#D1D5DB"/><text x="48" y="1156" class="muted body">希望会议室增加可视化预约状态。</text>
  <rect x="0" y="1228" width="390" height="76" fill="#fff" stroke="#E5E7EB"/><rect x="16" y="1244" width="358" height="44" rx="12" class="primary"/><text x="164" y="1272" fill="#fff" font-family="system-ui" font-size="15" font-weight="700">提交投票</text>

  <line x1="16" y1="1330" x2="374" y2="1330" stroke="#E5E7EB"/><text x="16" y="1372" class="primary small" font-weight="700">结果页</text><text x="16" y="1404" class="text h1">投票结果统计</text><rect x="16" y="1424" width="108" height="80" rx="16" class="card"/><text x="32" y="1452" class="muted small">参与人数</text><text x="32" y="1488" class="text metric">356</text><rect x="140" y="1424" width="108" height="80" rx="16" class="card"/><text x="156" y="1452" class="muted small">参与率</text><text x="156" y="1488" class="text metric">84%</text><rect x="264" y="1424" width="110" height="80" rx="16" class="card"/><text x="280" y="1452" class="muted small">平均分</text><text x="280" y="1488" class="text metric">4.2</text>
  <rect x="0" y="1508" width="390" height="52" fill="#fff" stroke="#E5E7EB"/><text x="36" y="1538" class="primary small" font-weight="700">投票列表</text><text x="132" y="1538" class="muted small">投票详情</text><text x="236" y="1538" class="muted small">结果查看</text>
</svg>

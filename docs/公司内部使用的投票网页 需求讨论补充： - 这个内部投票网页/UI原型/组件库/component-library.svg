<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">公司内部投票网页组件库图片设计图</title>
  <desc id="desc">展示色彩、按钮、状态标签、表单、投票卡片、题目、图表、弹窗和上传组件。</desc>
  <defs><style>.bg{fill:#F9FAFB}.card{fill:#fff;stroke:#E5E7EB}.primary{fill:#2563EB}.pale{fill:#DBEAFE}.success{fill:#16A34A}.warn{fill:#F59E0B}.danger{fill:#DC2626}.info{fill:#0EA5E9}.text{fill:#111827;font-family:system-ui}.muted{fill:#4B5563;font-family:system-ui}.weak{fill:#9CA3AF;font-family:system-ui}.h1{font-size:24px;font-weight:700}.h2{font-size:18px;font-weight:700}.body{font-size:14px}.small{font-size:12px}.pill{font-size:12px;font-weight:700}</style><filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.08"/></filter></defs>
  <rect class="bg" width="1200" height="1200"/><text x="40" y="58" class="text h1">公司内部投票网页 - 组件库</text><text x="40" y="86" class="muted body">Design Tokens · Components · States · Charts · Forms</text>
  <rect x="40" y="120" width="1120" height="120" rx="16" class="card" filter="url(#s)"/><text x="64" y="154" class="text h2">色彩 Token</text><rect x="64" y="176" width="130" height="42" rx="10" class="primary"/><text x="76" y="203" fill="#fff" font-family="system-ui" font-size="12" font-weight="700">Primary</text><rect x="210" y="176" width="130" height="42" rx="10" class="pale"/><text x="222" y="203" class="text pill">Primary Light</text><rect x="356" y="176" width="130" height="42" rx="10" class="success"/><text x="368" y="203" fill="#fff" font-family="system-ui" font-size="12" font-weight="700">Success</text><rect x="502" y="176" width="130" height="42" rx="10" class="warn"/><text x="514" y="203" fill="#fff" font-family="system-ui" font-size="12" font-weight="700">Warning</text><rect x="648" y="176" width="130" height="42" rx="10" class="danger"/><text x="660" y="203" fill="#fff" font-family="system-ui" font-size="12" font-weight="700">Danger</text><rect x="794" y="176" width="130" height="42" rx="10" class="info"/><text x="806" y="203" fill="#fff" font-family="system-ui" font-size="12" font-weight="700">Info</text>

  <rect x="40" y="270" width="540" height="190" rx="16" class="card" filter="url(#s)"/><text x="64" y="304" class="text h2">按钮 Button</text><rect x="64" y="330" width="116" height="40" rx="10" class="primary"/><text x="86" y="356" fill="#fff" font-family="system-ui" font-size="14" font-weight="700">创建投票</text><rect x="194" y="330" width="116" height="40" rx="10" fill="#fff" stroke="#2563EB"/><text x="216" y="356" class="primary body" font-weight="700">下载模板</text><rect x="324" y="330" width="88" height="40" rx="10" fill="#fff" stroke="#E5E7EB"/><text x="352" y="356" class="text body" font-weight="700">返回</text><rect x="426" y="330" width="116" height="40" rx="10" class="danger"/><text x="448" y="356" fill="#fff" font-family="system-ui" font-size="14" font-weight="700">提前结束</text><rect x="64" y="392" width="100" height="40" rx="10" fill="#D1D5DB"/><text x="92" y="418" fill="#fff" font-family="system-ui" font-size="14" font-weight="700">已提交</text>
  <rect x="620" y="270" width="540" height="190" rx="16" class="card" filter="url(#s)"/><text x="644" y="304" class="text h2">状态标签 Status Tag</text><rect x="644" y="330" width="66" height="26" rx="13" class="pale"/><text x="659" y="348" class="primary pill">进行中</text><rect x="724" y="330" width="66" height="26" rx="13" fill="#DCFCE7"/><text x="739" y="348" class="success pill">已提交</text><rect x="804" y="330" width="66" height="26" rx="13" fill="#F3F4F6"/><text x="819" y="348" class="muted pill">已结束</text><rect x="884" y="330" width="78" height="26" rx="13" fill="#E0F2FE"/><text x="898" y="348" class="info pill">匿名投票</text><rect x="976" y="330" width="78" height="26" rx="13" fill="#FEF3C7"/><text x="990" y="348" fill="#92400E" font-family="system-ui" font-size="12" font-weight="700">实名投票</text>

  <rect x="40" y="500" width="540" height="260" rx="16" class="card" filter="url(#s)"/><text x="64" y="534" class="text h2">表单 Form Field</text><text x="64" y="572" class="muted body">投票标题 *</text><rect x="64" y="584" width="460" height="40" rx="10" fill="#fff" stroke="#D1D5DB"/><text x="78" y="610" class="text body">内部办公体验反馈</text><text x="64" y="654" class="muted body">结束时间 *</text><rect x="64" y="666" width="460" height="40" rx="10" fill="#fff" stroke="#DC2626"/><text x="78" y="692" class="text body">2026-04-01 10:00</text><text x="64" y="728" class="danger small">结束时间必须晚于当前时间。</text>
  <rect x="620" y="500" width="540" height="260" rx="16" class="card" filter="url(#s)"/><text x="644" y="534" class="text h2">投票卡片 Vote Card</text><text x="644" y="574" class="text h2">内部办公体验反馈</text><text x="644" y="602" class="muted body">包含评分、多选和文本反馈。</text><rect x="644" y="620" width="66" height="26" rx="13" class="pale"/><text x="659" y="638" class="primary pill">进行中</text><rect x="724" y="620" width="78" height="26" rx="13" fill="#E0F2FE"/><text x="738" y="638" class="info pill">匿名投票</text><rect x="644" y="670" width="98" height="40" rx="10" class="primary"/><text x="669" y="696" fill="#fff" font-family="system-ui" font-size="14" font-weight="700">去投票</text>

  <rect x="40" y="800" width="350" height="260" rx="16" class="card" filter="url(#s)"/><text x="64" y="834" class="text h2">题目组件</text><text x="64" y="874" class="text body" font-weight="700">单选题</text><rect x="64" y="892" width="270" height="42" rx="12" class="pale" stroke="#2563EB"/><circle cx="84" cy="913" r="9" class="primary"/><text x="104" y="918" class="text body">海边</text><text x="64" y="968" class="text body" font-weight="700">评分题</text><rect x="64" y="986" width="44" height="44" rx="12" fill="#fff" stroke="#E5E7EB"/><text x="82" y="1014" class="muted body">1</text><rect x="118" y="986" width="44" height="44" rx="12" class="primary"/><text x="136" y="1014" fill="#fff" font-family="system-ui" font-size="14">2</text>
  <rect x="425" y="800" width="350" height="260" rx="16" class="card" filter="url(#s)"/><text x="449" y="834" class="text h2">图表 Chart</text><text x="449" y="880" class="text body">选项 A</text><rect x="535" y="870" width="150" height="12" rx="6" fill="#EEF2FF"/><rect x="535" y="870" width="75" height="12" rx="6" class="primary"/><text x="700" y="883" class="text body">50%</text><text x="449" y="924" class="text body">选项 B</text><rect x="535" y="914" width="150" height="12" rx="6" fill="#EEF2FF"/><rect x="535" y="914" width="45" height="12" rx="6" class="info"/><text x="700" y="927" class="text body">30%</text><text x="449" y="968" class="text body">选项 C</text><rect x="535" y="958" width="150" height="12" rx="6" fill="#EEF2FF"/><rect x="535" y="958" width="30" height="12" rx="6" class="success"/><text x="700" y="971" class="text body">20%</text>
  <rect x="810" y="800" width="350" height="260" rx="16" class="card" filter="url(#s)"/><text x="834" y="834" class="text h2">弹窗 / 上传 / 空状态</text><rect x="834" y="860" width="286" height="84" rx="14" fill="#fff" stroke="#E5E7EB"/><text x="850" y="890" class="text body" font-weight="700">确认提交投票？</text><text x="850" y="916" class="muted small">提交后不可修改，请确认答案无误。</text><rect x="834" y="966" width="286" height="58" rx="14" fill="#EFF6FF" stroke="#BFDBFE" stroke-dasharray="6 4"/><text x="900" y="1001" class="primary body" font-weight="700">上传 Excel 文件</text>
</svg>
